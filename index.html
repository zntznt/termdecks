    nm.addEventListener('input',()=>{cat.name=nm.value;refresh();});
    head.appendChild(nm);
    const cdup=makeIcon('copy','Duplicate category');cdup.onclick=()=>{const id=dupCategory(cat.id);commit();if(id)flashEditor('.cat[data-cat="'+id+'"]');};
    const del=makeIcon('trash','Delete category','danger');del.onclick=()=>styledConfirm('Delete category “'+(cat.name||'')+'”?',()=>{state.categories.splice(ci,1);commit();},'Delete');
    head.appendChild(cdup);head.appendChild(del);
    cEl.appendChild(head);
    if(colCat){const meta=document.createElement('span');meta.className='cmeta';
      const ne=cat.sections.reduce((a,s)=>a+s.entries.length,0);
      meta.textContent=cat.sections.length+' sec · '+ne+' entr'+(ne===1?'y':'ies');nm.after(meta);
      root.appendChild(cEl);return;}
    // body: sections
    const body=document.createElement('div');body.className='cat-body';
    cat.sections.forEach((sec,si)=>{
      if(!secVisible(cat,sec))return;
      const secColor=effSec(cat,ci,sec,si);
      const colSec=collapsedSecs.has(sec.id)&&!search;
      const sEl=document.createElement('div');sEl.className='sec';sEl.style.borderLeftColor=secColor;sEl.dataset.cat=cat.id;sEl.dataset.sec=sec.id;
      sEl.addEventListener('focusin',()=>focusDeck(c=>c.secId===sec.id));
      const sh=document.createElement('div');sh.className='sec-head';
      const scol=document.createElement('button');scol.className='collapse';scol.innerHTML=ico(colSec?'chevronRight':'chevronDown',14);scol.title=colSec?'Expand':'Collapse';scol.setAttribute('aria-label',(colSec?'Expand':'Collapse')+' section '+(sec.name||''));scol.setAttribute('aria-expanded',String(!colSec));scol.onclick=()=>toggleCollapse('sec',sec.id);
      sh.appendChild(scol);
      const sg=document.createElement('span');sg.className='grip';sg.innerHTML=ico('grip',15);sg.title='Drag to reorder / move section';sg.setAttribute('draggable','true');sg.dataset.dh='section';
      sh.appendChild(sg);
      sh.appendChild(colorControl(()=>effSec(cat,ci,sec,si),v=>{sec.color=v;},sec.color?()=>{sec.color=null;}:null,'Section color'));
      const snm=document.createElement('input');snm.className='name-input';snm.value=sec.name;snm.placeholder='Section';
      snm.addEventListener('input',()=>{sec.name=snm.value;refresh();});
      sh.appendChild(snm);
      const sdup=makeIcon('copy','Duplicate section');sdup.onclick=()=>{const id=dupSection(cat.id,sec.id);commit();if(id)flashEditor('.sec[data-sec="'+id+'"]');};
      const sdel=makeIcon('trash','Delete section','danger');sdel.onclick=()=>{
        const del=()=>{cat.sections.splice(si,1);commit();};
        const nDecks=(state.decks||[]).filter(d=>(d.secIds||[]).includes(sec.id)).length;
        if(sec.entries.length||nDecks){const inDecks=nDecks?' It’s in '+nDecks+' deck'+(nDecks===1?'':'s')+'.':'';
          styledConfirm('Delete section “'+(sec.name||'')+'”? '+sec.entries.length+' entr'+(sec.entries.length===1?'y':'ies')+' will be removed.'+inDecks,del,'Delete');}
        else del();};
      sh.appendChild(sdup);sh.appendChild(sdel);
      sEl.appendChild(sh);
      if(colSec){const m=document.createElement('span');m.className='cmeta';
        m.textContent=sec.entries.length+' entr'+(sec.entries.length===1?'y':'ies');snm.after(m);
        body.appendChild(sEl);return;}
      // entries
      const sb=document.createElement('div');sb.className='sec-body';
      const mh=document.createElement('div');mh.className='minihead';
      mh.innerHTML='<span>command  ·  use `backticks` for keycaps</span><span>description</span>';
      sb.appendChild(mh);
      sec.entries.forEach((e,ei)=>{
        if(!entryVisible(cat,sec,e))return;
        const r=document.createElement('div');r.className='entry-row'+(search&&entryMatches(e,search)?' hit':'');
        r.dataset.cat=cat.id;r.dataset.sec=sec.id;r.dataset.entry=e.id;
        const g=document.createElement('span');g.className='grip';g.innerHTML=ico('grip',15);g.title='Drag to reorder / move to another section';g.setAttribute('draggable','true');g.dataset.dh='entry';
        const ic=document.createElement('input');ic.className='cmd';ic.value=e.cmd;ic.placeholder='dd';
        ic.addEventListener('input',()=>{e.cmd=ic.value;refresh();});
        ic.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();const d=r.querySelector('input.desc');if(d)d.focus();}});
        const id=document.createElement('input');id.className='desc';id.value=e.desc;id.placeholder='delete line';
        id.addEventListener('input',()=>{e.desc=id.value;refresh();});
        id.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();addEntry(sec,ei+1);}});
        const hasQ=!!(e.q&&e.q.trim());
        const qbtn=makeIcon('help','Add a question for the back');qbtn.className='iconbtn qbtn'+(hasQ?' has':'');
        qbtn.onclick=()=>{if(qOpen.has(e.id))qOpen.delete(e.id);else qOpen.add(e.id);renderEditor();
          const f=document.querySelector('[data-q="'+e.id+'"]');if(f)f.focus();};
        const edup=makeIcon('copy','Duplicate');edup.onclick=()=>{const id=dupEntry(cat.id,sec.id,e.id);commit();if(id)flashEditor('.entry-row[data-entry="'+id+'"]');};
        const edel=makeIcon('trash','Delete','danger');edel.onclick=()=>{
          const del=()=>{sec.entries.splice(ei,1);commit();};
          if((e.cmd||'').trim()||(e.desc||'').trim()||(e.q||'').trim())styledConfirm('Delete “'+((e.cmd||e.desc||'this entry').trim())+'”?',del,'Delete');
          else del();};
        r.append(g,ic,id,qbtn,edup,edel);
        sb.appendChild(r);
        if(hasQ||qOpen.has(e.id)){
          const qr=document.createElement('div');qr.className='q-row';
          const qi=document.createElement('input');qi.className='qinput';qi.value=e.q||'';qi.setAttribute('data-q',e.id);
          qi.placeholder='Question shown under the back label (optional)';
          qi.addEventListener('input',()=>{e.q=qi.value;refresh();});
          qr.appendChild(qi);sb.appendChild(qr);
        }
      });
      const al=document.createElement('div');al.className='addline';
      const ae=document.createElement('button');ae.className='btn ghost sm';ae.textContent='+ entry';
      ae.onclick=()=>addEntry(sec);
      al.appendChild(ae);sb.appendChild(al);
      sEl.appendChild(sb);
      body.appendChild(sEl);
    });
    const as=document.createElement('button');as.className='btn ghost sm';as.style.marginTop='6px';as.textContent='+ section';
    as.onclick=()=>{cat.sections.push({id:uid(),name:'New section',color:null,entries:[{id:uid(),cmd:'',desc:''}]});commit();};
    body.appendChild(as);
    cEl.appendChild(body);
    root.appendChild(cEl);
  });
  if(search && !root.querySelector('.cat')){const n=document.createElement('div');n.className='empty-note';n.style.textAlign='left';n.style.padding='6px 2px 14px';n.innerHTML='No editor items match “'+search.replace(/</g,'&lt;')+'”.<br>Clear the search to edit everything.';root.appendChild(n);}
  const addCat=document.createElement('button');addCat.className='btn';addCat.style.width='100%';addCat.textContent='+ Add category';
  addCat.onclick=()=>{state.categories.push({id:uid(),name:'New category',color:null,
    sections:[{id:uid(),name:'Section',color:null,entries:[{id:uid(),cmd:'',desc:''}]}]});commit();};
  root.appendChild(addCat);
}
/* scroll a freshly created/duplicated editor node into view and flash it */
function flashEditor(sel){const el=$('#editor').querySelector(sel);if(!el)return;
  if(el.scrollIntoView)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  el.classList.remove('flash');requestAnimationFrame(()=>el.classList.add('flash'));
  setTimeout(()=>el.classList.remove('flash'),1200);}
function addEntry(sec,at){const e={id:uid(),cmd:'',desc:''};if(at==null)sec.entries.push(e);else sec.entries.splice(at,0,e);commit();
  // commit() renders synchronously, so the new row exists now — focus it directly.
  const row=document.querySelector('.entry-row[data-entry="'+e.id+'"]');const ic=row&&row.querySelector('input.cmd');if(ic)ic.focus();}

/* ============================================================
   Glue
   ============================================================ */
let refreshT;
function refresh(){invalidate();save();clearTimeout(refreshT);refreshT=setTimeout(renderPreview,90);}
function refilter(){renderEditor();renderPreview();}
function restyleAndPreview(){refresh();}
function commit(){renderEditor();refresh();}

const FONTSTACKS={
  jb:"'JetBrainsMono Nerd Font','JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,monospace",
  plex:"'IBM Plex Mono',ui-monospace,Menlo,monospace",
  fira:"'Fira Code',ui-monospace,Menlo,monospace",
  sys:"ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace",
};
const FONTLINKS={
  plex:'https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap',
  fira:'https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap',
};
const loadedFonts={};
function applyFont(){
  const key=state.font;const url=FONTLINKS[key];
  if(url && !loadedFonts[key]){const l=document.createElement('link');l.rel='stylesheet';l.href=url;document.head.appendChild(l);loadedFonts[key]=true;}
  document.documentElement.style.setProperty('--card-font',FONTSTACKS[key]||FONTSTACKS.jb);
  // re-pack after font swaps in
  invalidate();
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>{invalidate();renderPreview();});}
  setTimeout(()=>{invalidate();renderPreview();},400);
}
function applyPageStyle(){
  const letter={w:8.5,h:11,mv:0.25,mh:0.5}, a4={w:8.27,h:11.69,mv:0.595,mh:0.385};
  const p=state.paper==='a4'?a4:letter;
  $('#pageStyle').textContent='@page{size:'+p.w+'in '+p.h+'in;margin:'+p.mv+'in '+p.mh+'in;}';
}
function applyAll(){
  document.documentElement.style.setProperty('--card-fs',state.fs+'px');
  document.documentElement.style.setProperty('--grid-zoom',state.gridZoom);
  const gz=$('#gridSize');if(gz)gz.value=state.gridZoom;
  applyFont();applyPageStyle();
}
function applyEditorVisibility(){
  const open=store.editorOpen!==false;
  $('.main').classList.toggle('editor-hidden',!open);
  const b=$('#editToggle');if(b){b.classList.toggle('on',open);b.setAttribute('aria-pressed',String(open));}
  // pane width changed → re-fit the single-card preview
  requestAnimationFrame(applyFit);
}

/* bind toolbar */
function bindToolbar(){
  const t=$('#title');t.value=state.title;t.addEventListener('input',()=>{state.title=t.value;save();});
  buildDropdown({key:'faces',get:()=>facesMode,set:v=>{facesMode=v;renderPreview();},opts:[['front','Fronts'],['back','Backs']]});
  // Settings & Help modals (Card/Print/Data in Settings; about + shortcuts in Help)
  $('#settingsBtn').addEventListener('click',openSettings);
  $('#helpBtn').addEventListener('click',openHelp);
  // resizable divider (this is the "zoom" — the card auto-fits whatever width you give it)
  const divider=$('#divider'),pane=$('#pane'),main=$('.main');
  let drag=false;
  // Pointer Events so the divider works for mouse, touch and pen alike.
  divider.addEventListener('pointerdown',e=>{drag=true;divider.classList.add('drag');document.body.style.userSelect='none';
    try{divider.setPointerCapture(e.pointerId);}catch(_){}e.preventDefault();});
  divider.addEventListener('pointermove',e=>{if(!drag)return;const r=main.getBoundingClientRect();
    // Math.max keeps the upper bound from dropping below the lower one on narrow windows (clamp would otherwise invert).
    const w=clamp(r.right-e.clientX,360,Math.max(360,r.width-380));pane.style.setProperty('--pane-w',w+'px');applyFit();});
  const endDrag=()=>{if(drag){drag=false;divider.classList.remove('drag');document.body.style.userSelect='';}};
  divider.addEventListener('pointerup',endDrag);divider.addEventListener('pointercancel',endDrag);
  let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(applyFit,80);});

  // Single / Grid / Quiz tabs (only the ones with data-mode — not the Edit toggle)
  const viewTabs=[...pane.querySelectorAll('.seg-btn[data-mode]')];
  viewTabs.forEach(b=>b.addEventListener('click',()=>{
    viewMode=b.dataset.mode;selecting=false;if(viewMode==='quiz')quizRevealed=false;
    viewTabs.forEach(x=>x.classList.toggle('active',x===b));renderPreview();}));
  // Edit toggle — show/hide the editor; the card pane reflows to fill
  $('#editToggle').addEventListener('click',()=>{store.editorOpen=!store.editorOpen;applyEditorVisibility();save();});

  // decks
  refreshDeckOptions();
  $('#deckBtn').addEventListener('click',()=>{const m=$('#deckMenu');if(m.hidden){refreshDeckOptions();openMenu(m);}else closeAllMenus();});
  $('#filterBtn').addEventListener('click',()=>{const m=$('#filterMenu');if(m.hidden){buildFilterMenu();openMenu(m);}else closeAllMenus();});
  $('#deckNew').addEventListener('click',()=>styledPrompt('Name this deck','Deck '+(state.decks.length+1),nm=>{
    const d={id:uid(),name:nm,secIds:[]};state.decks.push(d);state.activeDeck=d.id;selecting=true;save();refreshDeckOptions();renderPreview();},'Create'));
  $('#deckRename').addEventListener('click',()=>{const d=activeDeckObj();if(!d)return;styledPrompt('Rename deck',d.name,nm=>{d.name=nm;save();refreshDeckOptions();updateDeckButtons();},'Rename');});
  $('#deckDelete').addEventListener('click',()=>{const d=activeDeckObj();if(!d)return;styledConfirm('Delete deck “'+d.name+'”? Your cards are not deleted.',()=>{
    state.decks=state.decks.filter(x=>x!==d);state.activeDeck=null;selecting=false;save();refreshDeckOptions();renderPreview();},'Delete');});
  $('#deckSelect').addEventListener('click',()=>{if(!activeDeckObj())return;selecting=!selecting;renderPreview();});
  $('#gridSize').addEventListener('input',()=>{state.gridZoom=parseFloat($('#gridSize').value);document.documentElement.style.setProperty('--grid-zoom',state.gridZoom);save();});
  $('#expandBtn').addEventListener('click',()=>{pane.classList.toggle('full');requestAnimationFrame(applyFit);});

  // search
  const sr=$('#search'),clr=$('#searchClr');
  function setSearch(v){search=norm(v);previewIndex=0;clr.hidden=!search;
    if($('#search').value!==v)$('#search').value=v;refilter();}
  sr.addEventListener('input',()=>setSearch(sr.value));
  sr.addEventListener('keydown',e=>{if(e.key==='Escape'){setSearch('');}});
  clr.addEventListener('click',()=>{setSearch('');sr.focus();});

  window.addEventListener('keydown',e=>{if(e.key==='Escape'&&pane.classList.contains('full')){pane.classList.remove('full');requestAnimationFrame(applyFit);}});

  $('#printBtn').addEventListener('click',()=>{
    if(!deck().length){toast(search||filtersActive()?'Nothing to print — no cards match the current search/filters.':'Nothing to print — add some cards first.','warn');return;}
    renderPrint();setTimeout(()=>window.print(),60);});
  window.addEventListener('beforeprint',renderPrint);

  $('#collectionsBtn').addEventListener('click',openCollections);
  $('#fileInput').addEventListener('change',ev=>{
    const f=ev.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const o=JSON.parse(r.result);let added=0;
      if(o&&Array.isArray(o.collections)){o.collections.filter(c=>c&&Array.isArray(c.categories)).forEach(c=>{c.id=uid();normalizeCollection(c);store.collections.push(c);added++;});}
      else if(o&&Array.isArray(o.categories)){o.id=uid();normalizeCollection(o);store.collections.push(o);added++;}
      else throw 0;
      if(!added)throw 0;
      if(added){store.activeId=store.collections[store.collections.length-1].id;applyCollectionSwitch();save();
        toast('Imported '+added+' collection'+(added===1?'':'s')+'.','ok');}
      document.querySelectorAll('.modal-ov').forEach(m=>m.remove());
    }catch(e){alert('Could not read that file — is it a TermDecks collection export?');}};
    r.readAsText(f);ev.target.value='';
  });

  // CSV import (append-only) — triggered from the Settings ▸ Data section
  $('#csvFile').addEventListener('change',ev=>{const f=ev.target.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=()=>{const res=csvToItems(rd.result);if(res&&res.error){alert(res.error);}else if(res){showCsvPreview(res.items);}};
    rd.readAsText(f);ev.target.value='';});
  applyIcons();
  // drag-and-drop reordering
  setupDnd();
  // keyboard shortcuts
  window.addEventListener('keydown',e=>{
    const typing=/^(input|textarea|select)$/i.test(e.target.tagName)||e.target.isContentEditable;
    if(e.key==='/'&&!typing){e.preventDefault();$('#search').focus();}
    else if(e.key==='ArrowRight'&&!typing){e.preventDefault();navPreview(1);}
    else if(e.key==='ArrowLeft'&&!typing){e.preventDefault();navPreview(-1);}
    else if((e.key==='f'||e.key==='F')&&!typing){
      if(viewMode==='quiz'){quizRevealed=!quizRevealed;renderQuiz();}
      else if(viewMode==='single'&&curFlip)curFlip.classList.toggle('flipped');
      else if(viewMode==='grid'){const el=gridEls[previewIndex]||gridEls[0];if(el){el.classList.toggle('flipped');highlightGridCard(gridEls.indexOf(el));}}
    }
    else if(e.key===' '&&viewMode==='quiz'&&!typing){e.preventDefault();if(!quizRevealed){quizRevealed=true;renderQuiz();}}
    else if((e.key==='s'||e.key==='S')&&viewMode==='quiz'&&!typing){shuffleQuiz();}
    // self-grade once the answer is revealed: 1 = Again, 2 = Got it
    else if(e.key==='1'&&viewMode==='quiz'&&quizRevealed&&!typing){const it=currentQuizItem();if(it)srGrade(it.id,false);}
    else if(e.key==='2'&&viewMode==='quiz'&&quizRevealed&&!typing){const it=currentQuizItem();if(it)srGrade(it.id,true);}
  });
}
function syncToolbar(){
  $('#title').value=state.title||'';
  Object.keys(ddRebuild).forEach(k=>ddRebuild[k]());
  refreshDeckOptions();
}

/* ---------- boot ---------- */
load();
fileBackup.restore();
bindToolbar();
applyAll();
applyEditorVisibility();
renderEditor();
(function(){const m=$('.main');const base=(m&&m.getBoundingClientRect().width)||window.innerWidth||1200;
  $('#pane').style.setProperty('--pane-w',clamp(Math.round(base*0.56),480,1200)+'px');})();
renderPreview();
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>{invalidate();renderPreview();});}
</script>
